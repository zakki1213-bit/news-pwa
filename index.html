<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ニュース</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
<style>
  :root {
    --bg: #f8f9fa;
    --bg-card: #ffffff;
    --text: #1a1a1a;
    --text-dim: #6b7280;
    --border: #e5e7eb;
    --primary: #2563eb;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --shadow-hover: 0 4px 14px rgba(0,0,0,.10);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --bg-card: #1e293b;
      --text: #f1f5f9;
      --text-dim: #94a3b8;
      --border: #334155;
      --primary: #60a5fa;
      --shadow: 0 1px 3px rgba(0,0,0,.4);
      --shadow-hover: 0 4px 14px rgba(0,0,0,.6);
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  header {
    position: sticky;
    top: 0;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    z-index: 100;
    box-shadow: var(--shadow);
  }
  .header-row {
    display: flex;
    gap: .75rem;
    align-items: center;
    max-width: 1400px;
    margin: 0 auto;
    padding: .75rem 1rem .5rem;
    flex-wrap: wrap;
  }
  h1 {
    font-size: 1.15rem;
    margin: 0;
    flex-shrink: 0;
  }
  .search-box {
    flex: 1;
    min-width: 180px;
    padding: .5rem .75rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: .95rem;
  }
  .search-box:focus {
    outline: none;
    border-color: var(--primary);
  }
  .toggle {
    display: flex;
    gap: .35rem;
    align-items: center;
    font-size: .85rem;
    color: var(--text-dim);
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
  }
  .toggle input { cursor: pointer; }
  .filters {
    display: flex;
    gap: .5rem;
    padding: .25rem 1rem .75rem;
    overflow-x: auto;
    max-width: 1400px;
    margin: 0 auto;
    -webkit-overflow-scrolling: touch;
  }
  .filters::-webkit-scrollbar { display: none; }
  .chip {
    padding: .35rem .85rem;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text);
    cursor: pointer;
    font-size: .85rem;
    white-space: nowrap;
    flex-shrink: 0;
    transition: all .15s;
  }
  .chip:hover { border-color: var(--primary); }
  .chip.active {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1rem;
  }
  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: .75rem;
    font-size: .8rem;
    color: var(--text-dim);
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: .6rem;
  }
  @media (min-width: 900px) {
    .grid { grid-template-columns: 1fr 1fr; gap: .75rem; }
  }
  .card {
    background: var(--bg-card);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: transform .12s, box-shadow .15s, opacity .15s;
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: .85rem;
    padding: .75rem;
    text-decoration: none;
    color: inherit;
    border: 1px solid transparent;
    align-items: stretch;
  }
  .card:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow-hover);
  }
  .card.read { opacity: .55; }
  .card.no-thumb { grid-template-columns: 1fr; }
  .card-thumb {
    aspect-ratio: 4/3;
    background: var(--border);
    border-radius: 6px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .card-body {
    display: flex;
    flex-direction: column;
    gap: .35rem;
    min-width: 0;
  }
  .card-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: .5rem;
    font-size: .72rem;
    color: var(--text-dim);
  }
  .card-badge {
    padding: .1rem .5rem;
    border-radius: 4px;
    font-size: .7rem;
    color: #fff;
    font-weight: 600;
    white-space: nowrap;
  }
  .card-time { white-space: nowrap; }
  .card-title {
    font-size: .98rem;
    font-weight: 600;
    margin: 0;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-snippet {
    font-size: .82rem;
    color: var(--text-dim);
    margin: 0;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-source {
    font-size: .72rem;
    color: var(--text-dim);
    margin-top: auto;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  @media (max-width: 600px) {
    .card { grid-template-columns: 96px 1fr; gap: .65rem; padding: .6rem; }
    .card-title { font-size: .92rem; }
    .card-snippet { -webkit-line-clamp: 2; font-size: .78rem; }
  }
  .empty, .loading {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-dim);
    grid-column: 1 / -1;
  }
  .load-more {
    grid-column: 1 / -1;
    text-align: center;
    padding: 1rem;
  }
  .btn {
    background: var(--primary);
    color: #fff;
    border: none;
    padding: .55rem 1.5rem;
    border-radius: 8px;
    font-size: .92rem;
    cursor: pointer;
    font-weight: 500;
  }
  .btn:hover { filter: brightness(1.05); }
  @media (max-width: 600px) {
    h1 { font-size: 1.05rem; }
    .header-row { gap: .5rem; padding: .6rem .75rem .4rem; }
    main { padding: .75rem; }
    .grid { gap: .75rem; }
  }
</style>
</head>
<body>
<header>
  <div class="header-row">
    <h1>📰 ニュース</h1>
    <input type="search" class="search-box" id="search" placeholder="検索（タイトル・本文・出典）" autocomplete="off">
    <label class="toggle"><input type="checkbox" id="unread-only">未読のみ</label>
  </div>
  <div class="filters" id="filters"></div>
</header>
<main>
  <div class="meta-row">
    <span id="count">読み込み中…</span>
    <span id="updated"></span>
  </div>
  <div class="grid" id="grid">
    <div class="loading">ニュースを取得しています…</div>
  </div>
</main>

<script>
const STATE = {
  data: null,
  filterTopic: 'all',
  search: '',
  unreadOnly: false,
  readSet: new Set(),
  renderLimit: 60,
};

const READ_KEY = 'news-pwa.read';
const READ_RETENTION_DAYS = 60;

function loadReadState() {
  try {
    const raw = localStorage.getItem(READ_KEY);
    if (!raw) return new Map();
    const obj = JSON.parse(raw);
    return new Map(Object.entries(obj));
  } catch { return new Map(); }
}
function saveReadState(map) {
  const cutoff = Date.now() - READ_RETENTION_DAYS * 86400 * 1000;
  const obj = {};
  for (const [url, ts] of map) if (ts >= cutoff) obj[url] = ts;
  localStorage.setItem(READ_KEY, JSON.stringify(obj));
}

const READ_MAP = loadReadState();
STATE.readSet = new Set(READ_MAP.keys());

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const sec = diff / 1000;
  if (sec < 60) return 'たった今';
  if (sec < 3600) return Math.floor(sec / 60) + '分前';
  if (sec < 86400) return Math.floor(sec / 3600) + '時間前';
  if (sec < 86400 * 7) return Math.floor(sec / 86400) + '日前';
  const d = new Date(ts);
  return `${d.getMonth() + 1}/${d.getDate()}`;
}

function fmtUpdated(iso) {
  const d = new Date(iso);
  const pad = n => String(n).padStart(2, '0');
  return `更新: ${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

async function loadNews() {
  try {
    const res = await fetch('news.json', { cache: 'no-cache' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    STATE.data = await res.json();
    renderFilters();
    render();
  } catch (e) {
    document.getElementById('grid').innerHTML =
      `<div class="empty">ニュースを取得できませんでした<br><small>${escapeHtml(e.message)}</small></div>`;
  }
}

function renderFilters() {
  const el = document.getElementById('filters');
  const all = { id: 'all', name: 'すべて', color: '#6b7280' };
  const chips = [all, ...STATE.data.topics];
  el.innerHTML = chips.map(t => {
    const active = STATE.filterTopic === t.id;
    const style = active ? `style="background:${t.color};border-color:${t.color};color:#fff"` : '';
    return `<button class="chip${active ? ' active' : ''}" data-id="${t.id}" ${style}>${escapeHtml(t.name)}</button>`;
  }).join('');
  el.querySelectorAll('.chip').forEach(b => {
    b.addEventListener('click', () => {
      STATE.filterTopic = b.dataset.id;
      STATE.renderLimit = 60;
      renderFilters();
      render();
    });
  });
}

function filterItems() {
  const q = STATE.search.trim().toLowerCase();
  return STATE.data.items.filter(it => {
    if (STATE.filterTopic !== 'all' && it.topicId !== STATE.filterTopic) return false;
    if (STATE.unreadOnly && STATE.readSet.has(it.url)) return false;
    if (q) {
      const blob = (it.title + ' ' + (it.snippet || '') + ' ' + it.source).toLowerCase();
      if (!blob.includes(q)) return false;
    }
    return true;
  });
}

function renderCard(it) {
  const isRead = STATE.readSet.has(it.url);
  const thumb = it.image
    ? `<div class="card-thumb"><img src="${escapeHtml(it.image)}" alt="" loading="lazy" referrerpolicy="no-referrer" onerror="this.parentElement.parentElement.classList.add('no-thumb');this.parentElement.remove()"></div>`
    : '';
  const noThumbCls = it.image ? '' : ' no-thumb';
  const snippet = it.snippet ? `<p class="card-snippet">${escapeHtml(it.snippet)}</p>` : '';
  return `
    <a class="card${isRead ? ' read' : ''}${noThumbCls}" href="${escapeHtml(it.url)}" target="_blank" rel="noopener noreferrer" data-url="${escapeHtml(it.url)}">
      ${thumb}
      <div class="card-body">
        <div class="card-head">
          <span class="card-badge" style="background:${escapeHtml(it.topicColor || '#6b7280')}">${escapeHtml(it.topicName)}</span>
          <span class="card-time">${timeAgo(it.pubDate)}</span>
        </div>
        <h3 class="card-title">${escapeHtml(it.title)}</h3>
        ${snippet}
        <div class="card-source">${escapeHtml(it.source)}</div>
      </div>
    </a>`;
}

function render() {
  const items = filterItems();
  const limited = items.slice(0, STATE.renderLimit);
  const grid = document.getElementById('grid');

  document.getElementById('count').textContent = `${items.length}件`;
  document.getElementById('updated').textContent = fmtUpdated(STATE.data.generatedAt);

  if (items.length === 0) {
    grid.innerHTML = '<div class="empty">該当するニュースはありません</div>';
    return;
  }

  let html = limited.map(renderCard).join('');
  if (items.length > limited.length) {
    html += `<div class="load-more"><button class="btn" id="more">もっと読む（残り${items.length - limited.length}件）</button></div>`;
  }
  grid.innerHTML = html;

  grid.querySelectorAll('.card').forEach(a => {
    a.addEventListener('click', () => {
      const url = a.dataset.url;
      STATE.readSet.add(url);
      READ_MAP.set(url, Date.now());
      saveReadState(READ_MAP);
      a.classList.add('read');
    });
  });
  const more = document.getElementById('more');
  if (more) more.addEventListener('click', () => { STATE.renderLimit += 60; render(); });
}

document.getElementById('search').addEventListener('input', e => {
  STATE.search = e.target.value;
  STATE.renderLimit = 60;
  render();
});
document.getElementById('unread-only').addEventListener('change', e => {
  STATE.unreadOnly = e.target.checked;
  STATE.renderLimit = 60;
  render();
});

loadNews();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
}
</script>
</body>
</html>
