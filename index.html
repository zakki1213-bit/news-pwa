<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ニュース</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
<style>
  :root {
    --bg: #f8f9fa;
    --bg-card: #ffffff;
    --text: #1a1a1a;
    --text-dim: #6b7280;
    --border: #e5e7eb;
    --primary: #2563eb;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --shadow-hover: 0 4px 14px rgba(0,0,0,.10);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --bg-card: #1e293b;
      --text: #f1f5f9;
      --text-dim: #94a3b8;
      --border: #334155;
      --primary: #60a5fa;
      --shadow: 0 1px 3px rgba(0,0,0,.4);
      --shadow-hover: 0 4px 14px rgba(0,0,0,.6);
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  header {
    position: sticky;
    top: 0;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    z-index: 100;
    box-shadow: var(--shadow);
  }
  .header-row {
    display: flex;
    gap: .75rem;
    align-items: center;
    max-width: 1400px;
    margin: 0 auto;
    padding: .75rem 1rem .5rem;
    flex-wrap: wrap;
  }
  h1 {
    font-size: 1.15rem;
    margin: 0;
    flex-shrink: 0;
  }
  .search-box {
    flex: 1;
    min-width: 180px;
    padding: .5rem .75rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: .95rem;
  }
  .search-box:focus {
    outline: none;
    border-color: var(--primary);
  }
  .toggle {
    display: flex;
    gap: .35rem;
    align-items: center;
    font-size: .85rem;
    color: var(--text-dim);
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
  }
  .toggle input { cursor: pointer; }
  .filters {
    display: flex;
    gap: .5rem;
    padding: .25rem 1rem .75rem;
    overflow-x: auto;
    max-width: 1400px;
    margin: 0 auto;
    -webkit-overflow-scrolling: touch;
  }
  .filters::-webkit-scrollbar { display: none; }
  .chip {
    padding: .35rem .85rem;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text);
    cursor: pointer;
    font-size: .85rem;
    white-space: nowrap;
    flex-shrink: 0;
    transition: all .15s;
  }
  .chip:hover { border-color: var(--primary); }
  .chip.active {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1rem;
  }
  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: .75rem;
    font-size: .8rem;
    color: var(--text-dim);
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: .6rem;
  }
  @media (min-width: 900px) {
    .grid { grid-template-columns: 1fr 1fr; gap: .75rem; }
  }
  .card {
    background: var(--bg-card);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: transform .12s, box-shadow .15s, opacity .15s;
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: .85rem;
    padding: .75rem;
    text-decoration: none;
    color: inherit;
    border: 1px solid transparent;
    align-items: stretch;
  }
  .card:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow-hover);
  }
  .card.read { opacity: .55; }
  .card.no-thumb { grid-template-columns: 1fr; }
  .card-thumb {
    aspect-ratio: 4/3;
    background: var(--border);
    border-radius: 6px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .card-body {
    display: flex;
    flex-direction: column;
    gap: .35rem;
    min-width: 0;
  }
  .card-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: .5rem;
    font-size: .72rem;
    color: var(--text-dim);
  }
  .card-badge {
    padding: .1rem .5rem;
    border-radius: 4px;
    font-size: .7rem;
    color: #fff;
    font-weight: 600;
    white-space: nowrap;
  }
  .card-time { white-space: nowrap; }
  .card-title {
    font-size: .98rem;
    font-weight: 600;
    margin: 0;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-snippet {
    font-size: .82rem;
    color: var(--text-dim);
    margin: 0;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-source {
    font-size: .72rem;
    color: var(--text-dim);
    margin-top: auto;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  @media (max-width: 600px) {
    .card { grid-template-columns: 96px 1fr; gap: .65rem; padding: .6rem; }
    .card-title { font-size: .92rem; }
    .card-snippet { -webkit-line-clamp: 2; font-size: .78rem; }
  }
  .empty, .loading {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-dim);
    grid-column: 1 / -1;
  }
  .load-more {
    grid-column: 1 / -1;
    text-align: center;
    padding: 1rem;
  }
  .btn {
    background: var(--primary);
    color: #fff;
    border: none;
    padding: .55rem 1.5rem;
    border-radius: 8px;
    font-size: .92rem;
    cursor: pointer;
    font-weight: 500;
  }
  .btn:hover { filter: brightness(1.05); }
  .btn-outline {
    background: transparent;
    color: var(--primary);
    border: 1px solid var(--primary);
  }
  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--bg-card);
    border-radius: 12px;
    max-width: 640px;
    width: 100%;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,.3);
  }
  .modal-head {
    padding: .9rem 1.1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: .75rem;
  }
  .modal-head .modal-title {
    margin: 0;
    font-size: 1rem;
    line-height: 1.4;
    font-weight: 600;
    flex: 1;
    min-width: 0;
  }
  .modal-head .topic {
    display: inline-block;
    padding: .1rem .5rem;
    border-radius: 4px;
    color: #fff;
    font-size: .7rem;
    font-weight: 600;
    margin-bottom: .35rem;
  }
  .modal-close {
    background: none;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    color: var(--text-dim);
    padding: 0 .25rem;
    line-height: 1;
    flex-shrink: 0;
  }
  .modal-body {
    padding: 1rem 1.1rem;
    flex: 1;
    overflow-y: auto;
    font-size: .92rem;
    line-height: 1.75;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .modal-body.error,
  .modal-loading {
    color: var(--text-dim);
    text-align: center;
    padding: 2rem 1.25rem;
  }
  .modal-foot {
    padding: .8rem 1.1rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: .75rem;
    font-size: .78rem;
    color: var(--text-dim);
  }
  .modal-foot .source {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }
  .modal-foot .btn { white-space: nowrap; flex-shrink: 0; padding: .45rem 1rem; font-size: .85rem; }
  .spinner {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    vertical-align: middle;
    margin-right: .5rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 600px) {
    h1 { font-size: 1.05rem; }
    .header-row { gap: .5rem; padding: .6rem .75rem .4rem; }
    main { padding: .75rem; }
    .grid { gap: .75rem; }
    .modal-body { font-size: .88rem; line-height: 1.7; }
  }
</style>
</head>
<body>
<header>
  <div class="header-row">
    <h1>📰 ニュース</h1>
    <input type="search" class="search-box" id="search" placeholder="検索（タイトル・本文・出典）" autocomplete="off">
    <label class="toggle"><input type="checkbox" id="unread-only">未読のみ</label>
  </div>
  <div class="filters" id="filters"></div>
</header>
<main>
  <div class="meta-row">
    <span id="count">読み込み中…</span>
    <span id="updated"></span>
  </div>
  <div class="grid" id="grid">
    <div class="loading">ニュースを取得しています…</div>
  </div>
</main>

<div class="modal-backdrop" id="modal" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-head">
      <div style="flex:1;min-width:0">
        <span class="topic" id="modal-topic"></span>
        <h2 class="modal-title" id="modal-title"></h2>
      </div>
      <button class="modal-close" id="modal-close" aria-label="閉じる">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot">
      <span class="source" id="modal-source"></span>
      <a class="btn" id="modal-link" href="#" target="_blank" rel="noopener noreferrer">元記事を開く</a>
    </div>
  </div>
</div>

<script>
const SUMMARIZER_URL = 'https://news-summarizer.zakki1213.workers.dev';
const SUMMARY_CACHE_KEY = 'news-pwa.summaries';
const SUMMARY_TTL_MS = 7 * 86400 * 1000;

const STATE = {
  data: null,
  filterTopic: 'all',
  search: '',
  unreadOnly: false,
  readSet: new Set(),
  renderLimit: 60,
};

const READ_KEY = 'news-pwa.read';
const READ_RETENTION_DAYS = 60;

function loadReadState() {
  try {
    const raw = localStorage.getItem(READ_KEY);
    if (!raw) return new Map();
    const obj = JSON.parse(raw);
    return new Map(Object.entries(obj));
  } catch { return new Map(); }
}
function saveReadState(map) {
  const cutoff = Date.now() - READ_RETENTION_DAYS * 86400 * 1000;
  const obj = {};
  for (const [url, ts] of map) if (ts >= cutoff) obj[url] = ts;
  localStorage.setItem(READ_KEY, JSON.stringify(obj));
}

const READ_MAP = loadReadState();
STATE.readSet = new Set(READ_MAP.keys());

function loadSummaryCache() {
  try {
    const raw = localStorage.getItem(SUMMARY_CACHE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}
function saveSummaryCache() {
  const now = Date.now();
  const cleaned = {};
  for (const [k, v] of Object.entries(SUMMARY_CACHE)) {
    if (now - v.ts < SUMMARY_TTL_MS) cleaned[k] = v;
  }
  localStorage.setItem(SUMMARY_CACHE_KEY, JSON.stringify(cleaned));
}
const SUMMARY_CACHE = loadSummaryCache();

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const sec = diff / 1000;
  if (sec < 60) return 'たった今';
  if (sec < 3600) return Math.floor(sec / 60) + '分前';
  if (sec < 86400) return Math.floor(sec / 3600) + '時間前';
  if (sec < 86400 * 7) return Math.floor(sec / 86400) + '日前';
  const d = new Date(ts);
  return `${d.getMonth() + 1}/${d.getDate()}`;
}

function fmtUpdated(iso) {
  const d = new Date(iso);
  const pad = n => String(n).padStart(2, '0');
  return `更新: ${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

async function loadNews() {
  try {
    const res = await fetch('news.json', { cache: 'no-cache' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    STATE.data = await res.json();
    STATE.itemMap = new Map(STATE.data.items.map(i => [i.url, i]));
    renderFilters();
    render();
  } catch (e) {
    document.getElementById('grid').innerHTML =
      `<div class="empty">ニュースを取得できませんでした<br><small>${escapeHtml(e.message)}</small></div>`;
  }
}

function openSummary(item) {
  const modal = document.getElementById('modal');
  const titleEl = document.getElementById('modal-title');
  const topicEl = document.getElementById('modal-topic');
  const bodyEl = document.getElementById('modal-body');
  const sourceEl = document.getElementById('modal-source');
  const linkEl = document.getElementById('modal-link');

  titleEl.textContent = item.title;
  topicEl.textContent = item.topicName;
  topicEl.style.background = item.topicColor || '#6b7280';
  sourceEl.textContent = item.source;
  linkEl.href = item.url;
  bodyEl.classList.remove('error');
  bodyEl.innerHTML = '<div class="modal-loading"><span class="spinner"></span>本文を取得して要約中…</div>';
  modal.hidden = false;
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';

  STATE.readSet.add(item.url);
  READ_MAP.set(item.url, Date.now());
  saveReadState(READ_MAP);

  const cached = SUMMARY_CACHE[item.url];
  if (cached && Date.now() - cached.ts < SUMMARY_TTL_MS) {
    showSummary(cached);
    return;
  }

  fetch(SUMMARIZER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ url: item.url }),
  })
    .then(r => r.json())
    .then(data => {
      const entry = { ...data, ts: Date.now() };
      SUMMARY_CACHE[item.url] = entry;
      saveSummaryCache();
      showSummary(entry);
    })
    .catch(err => {
      bodyEl.classList.add('error');
      bodyEl.textContent = '通信エラー: ' + (err.message || err);
    });
}

function showSummary(entry) {
  const bodyEl = document.getElementById('modal-body');
  if (entry.ok && entry.summary) {
    bodyEl.classList.remove('error');
    bodyEl.textContent = entry.summary;
  } else {
    bodyEl.classList.add('error');
    bodyEl.textContent = entry.message || '要約を取得できませんでした。元記事をご覧ください。';
  }
}

function closeModal() {
  const modal = document.getElementById('modal');
  modal.hidden = true;
  modal.classList.remove('open');
  document.body.style.overflow = '';
}

function renderFilters() {
  const el = document.getElementById('filters');
  const all = { id: 'all', name: 'すべて', color: '#6b7280' };
  const chips = [all, ...STATE.data.topics];
  el.innerHTML = chips.map(t => {
    const active = STATE.filterTopic === t.id;
    const style = active ? `style="background:${t.color};border-color:${t.color};color:#fff"` : '';
    return `<button class="chip${active ? ' active' : ''}" data-id="${t.id}" ${style}>${escapeHtml(t.name)}</button>`;
  }).join('');
  el.querySelectorAll('.chip').forEach(b => {
    b.addEventListener('click', () => {
      STATE.filterTopic = b.dataset.id;
      STATE.renderLimit = 60;
      renderFilters();
      render();
    });
  });
}

function filterItems() {
  const q = STATE.search.trim().toLowerCase();
  return STATE.data.items.filter(it => {
    if (STATE.filterTopic !== 'all' && it.topicId !== STATE.filterTopic) return false;
    if (STATE.unreadOnly && STATE.readSet.has(it.url)) return false;
    if (q) {
      const blob = (it.title + ' ' + (it.snippet || '') + ' ' + it.source).toLowerCase();
      if (!blob.includes(q)) return false;
    }
    return true;
  });
}

function renderCard(it) {
  const isRead = STATE.readSet.has(it.url);
  const thumb = it.image
    ? `<div class="card-thumb"><img src="${escapeHtml(it.image)}" alt="" loading="lazy" referrerpolicy="no-referrer" onerror="this.parentElement.parentElement.classList.add('no-thumb');this.parentElement.remove()"></div>`
    : '';
  const noThumbCls = it.image ? '' : ' no-thumb';
  const snippet = it.snippet ? `<p class="card-snippet">${escapeHtml(it.snippet)}</p>` : '';
  return `
    <a class="card${isRead ? ' read' : ''}${noThumbCls}" href="${escapeHtml(it.url)}" target="_blank" rel="noopener noreferrer" data-url="${escapeHtml(it.url)}">
      ${thumb}
      <div class="card-body">
        <div class="card-head">
          <span class="card-badge" style="background:${escapeHtml(it.topicColor || '#6b7280')}">${escapeHtml(it.topicName)}</span>
          <span class="card-time">${timeAgo(it.pubDate)}</span>
        </div>
        <h3 class="card-title">${escapeHtml(it.title)}</h3>
        ${snippet}
        <div class="card-source">${escapeHtml(it.source)}</div>
      </div>
    </a>`;
}

function render() {
  const items = filterItems();
  const limited = items.slice(0, STATE.renderLimit);
  const grid = document.getElementById('grid');

  document.getElementById('count').textContent = `${items.length}件`;
  document.getElementById('updated').textContent = fmtUpdated(STATE.data.generatedAt);

  if (items.length === 0) {
    grid.innerHTML = '<div class="empty">該当するニュースはありません</div>';
    return;
  }

  let html = limited.map(renderCard).join('');
  if (items.length > limited.length) {
    html += `<div class="load-more"><button class="btn" id="more">もっと読む（残り${items.length - limited.length}件）</button></div>`;
  }
  grid.innerHTML = html;

  grid.querySelectorAll('.card').forEach(a => {
    a.addEventListener('click', (e) => {
      e.preventDefault();
      const url = a.dataset.url;
      const item = STATE.itemMap.get(url);
      if (!item) { window.open(url, '_blank', 'noopener'); return; }
      a.classList.add('read');
      openSummary(item);
    });
  });
  const more = document.getElementById('more');
  if (more) more.addEventListener('click', () => { STATE.renderLimit += 60; render(); });
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target.id === 'modal') closeModal();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && !document.getElementById('modal').hidden) closeModal();
});

document.getElementById('search').addEventListener('input', e => {
  STATE.search = e.target.value;
  STATE.renderLimit = 60;
  render();
});
document.getElementById('unread-only').addEventListener('change', e => {
  STATE.unreadOnly = e.target.checked;
  STATE.renderLimit = 60;
  render();
});

loadNews();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
}
</script>
</body>
</html>
