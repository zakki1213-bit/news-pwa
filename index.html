<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ニュース</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
<style>
  :root {
    --bg: #f8f9fa;
    --bg-card: #ffffff;
    --text: #1a1a1a;
    --text-dim: #6b7280;
    --border: #e5e7eb;
    --primary: #2563eb;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --shadow-hover: 0 4px 14px rgba(0,0,0,.10);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --bg-card: #1e293b;
      --text: #f1f5f9;
      --text-dim: #94a3b8;
      --border: #334155;
      --primary: #60a5fa;
      --shadow: 0 1px 3px rgba(0,0,0,.4);
      --shadow-hover: 0 4px 14px rgba(0,0,0,.6);
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  header {
    position: sticky;
    top: 0;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    z-index: 100;
    box-shadow: var(--shadow);
  }
  .header-row {
    display: flex;
    gap: .75rem;
    align-items: center;
    max-width: 1400px;
    margin: 0 auto;
    padding: .75rem 1rem .5rem;
    flex-wrap: wrap;
  }
  h1 {
    font-size: 1.15rem;
    margin: 0;
    flex-shrink: 0;
  }
  .search-box {
    flex: 1;
    min-width: 180px;
    padding: .5rem .75rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: .95rem;
  }
  .search-box:focus {
    outline: none;
    border-color: var(--primary);
  }
  .toggle {
    display: flex;
    gap: .35rem;
    align-items: center;
    font-size: .85rem;
    color: var(--text-dim);
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
  }
  .toggle input { cursor: pointer; }
  .filters {
    display: flex;
    gap: .5rem;
    padding: .25rem 1rem .75rem;
    overflow-x: auto;
    max-width: 1400px;
    margin: 0 auto;
    -webkit-overflow-scrolling: touch;
  }
  .filters::-webkit-scrollbar { display: none; }
  .chip {
    padding: .35rem .85rem;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text);
    cursor: pointer;
    font-size: .85rem;
    white-space: nowrap;
    flex-shrink: 0;
    transition: all .15s;
  }
  .chip:hover { border-color: var(--primary); }
  .chip.active {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1rem;
  }
  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: .75rem;
    font-size: .8rem;
    color: var(--text-dim);
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: .6rem;
  }
  @media (min-width: 760px) {
    .grid { grid-template-columns: 1fr 1fr; gap: .7rem; }
  }
  @media (min-width: 1100px) {
    .grid { grid-template-columns: 1fr 1fr 1fr; gap: .75rem; }
  }
  .card {
    background: var(--bg-card);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: transform .12s, box-shadow .15s, opacity .15s;
    display: flex;
    flex-direction: row;
    gap: .85rem;
    padding: .75rem;
    text-decoration: none;
    color: inherit;
    border: 1px solid transparent;
    align-items: flex-start;
  }
  .card:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow-hover);
  }
  .card.read { opacity: .55; }
  .card-thumb {
    flex: 0 0 96px;
    width: 96px;
    height: 96px;
    background: var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .card-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .card-body {
    flex: 1 1 auto;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: .35rem;
  }
  .card-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: .5rem;
    font-size: .72rem;
    color: var(--text-dim);
  }
  .card-head-right {
    display: flex;
    align-items: center;
    gap: .4rem;
    flex-shrink: 0;
  }
  .card-badge {
    padding: .1rem .5rem;
    border-radius: 4px;
    font-size: .7rem;
    color: #fff;
    font-weight: 600;
    white-space: nowrap;
  }
  .card-time { white-space: nowrap; }
  .card-bookmark {
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 4px;
    line-height: 0;
    color: var(--text-dim);
    opacity: .55;
    transition: opacity .15s, color .15s, transform .1s;
    border-radius: 4px;
  }
  .card-bookmark:hover { opacity: 1; transform: scale(1.1); }
  .card-bookmark svg { width: 16px; height: 16px; display: block; }
  .card-bookmark.saved { color: #f59e0b; opacity: 1; }
  .card-memo {
    background: rgba(245, 158, 11, .08);
    border-left: 3px solid #f59e0b;
    border-radius: 4px;
    padding: .4rem .55rem;
    font-size: .78rem;
    color: var(--text);
    line-height: 1.5;
    white-space: pre-wrap;
    word-wrap: break-word;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-actions {
    display: flex;
    gap: .35rem;
    margin-top: .25rem;
  }
  .card-actions button {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: .25rem .55rem;
    font-size: .75rem;
    cursor: pointer;
    color: var(--text-dim);
  }
  .card-actions button:hover { border-color: var(--primary); color: var(--primary); }
  .card-title {
    font-size: .98rem;
    font-weight: 600;
    margin: 0;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-snippet {
    font-size: .82rem;
    color: var(--text-dim);
    margin: 0;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-summary {
    font-size: .82rem;
    color: var(--text);
    line-height: 1.55;
    white-space: pre-wrap;
    word-wrap: break-word;
    display: -webkit-box;
    -webkit-line-clamp: 6;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-source {
    font-size: .72rem;
    color: var(--text-dim);
    margin-top: auto;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  @media (max-width: 600px) {
    .card { gap: .6rem; padding: .55rem; }
    .card-thumb { flex: 0 0 78px; width: 78px; height: 78px; }
    .card-title { font-size: .92rem; }
    .card-snippet { -webkit-line-clamp: 2; font-size: .78rem; }
  }
  .empty, .loading {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-dim);
    grid-column: 1 / -1;
  }
  .load-more {
    grid-column: 1 / -1;
    text-align: center;
    padding: 1rem;
  }
  .btn {
    background: var(--primary);
    color: #fff;
    border: none;
    padding: .55rem 1.5rem;
    border-radius: 8px;
    font-size: .92rem;
    cursor: pointer;
    font-weight: 500;
  }
  .btn:hover { filter: brightness(1.05); }
  .btn-outline {
    background: transparent;
    color: var(--primary);
    border: 1px solid var(--primary);
  }
  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--bg-card);
    border-radius: 12px;
    max-width: 640px;
    width: 100%;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,.3);
  }
  .modal-head {
    padding: .9rem 1.1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: .75rem;
  }
  .modal-head .modal-title {
    margin: 0;
    font-size: 1rem;
    line-height: 1.4;
    font-weight: 600;
    flex: 1;
    min-width: 0;
  }
  .modal-head .topic {
    display: inline-block;
    padding: .1rem .5rem;
    border-radius: 4px;
    color: #fff;
    font-size: .7rem;
    font-weight: 600;
    margin-bottom: .35rem;
  }
  .modal-close {
    background: none;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    color: var(--text-dim);
    padding: 0 .25rem;
    line-height: 1;
    flex-shrink: 0;
  }
  .modal-body {
    padding: 1rem 1.1rem;
    flex: 1;
    overflow-y: auto;
    font-size: .92rem;
    line-height: 1.75;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .modal-body.error,
  .modal-loading {
    color: var(--text-dim);
    text-align: center;
    padding: 2rem 1.25rem;
  }
  .modal-foot {
    padding: .8rem 1.1rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: .75rem;
    font-size: .78rem;
    color: var(--text-dim);
  }
  .modal-foot .source {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }
  .modal-foot .btn { white-space: nowrap; flex-shrink: 0; padding: .45rem 1rem; font-size: .85rem; }
  .spinner {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    vertical-align: middle;
    margin-right: .5rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* FAB */
  .fab {
    position: fixed;
    bottom: 1.2rem;
    right: 1.2rem;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--primary);
    color: #fff;
    border: none;
    font-size: 1.6rem;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,0,0,.25);
    z-index: 50;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .fab:hover { filter: brightness(1.05); }
  /* Settings button */
  .icon-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: .4rem .5rem;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1.05rem;
    line-height: 1;
    flex-shrink: 0;
  }
  .icon-btn:hover { border-color: var(--primary); color: var(--primary); }
  /* Form fields in modals */
  .form-row { display: flex; flex-direction: column; gap: .3rem; margin-bottom: .85rem; }
  .form-row label { font-size: .82rem; color: var(--text-dim); font-weight: 500; }
  .form-row input,
  .form-row textarea {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: .55rem .7rem;
    font-size: .92rem;
    font-family: inherit;
    width: 100%;
    box-sizing: border-box;
  }
  .form-row input:focus,
  .form-row textarea:focus { outline: none; border-color: var(--primary); }
  .form-row textarea { resize: vertical; min-height: 80px; }
  .form-help { font-size: .78rem; color: var(--text-dim); line-height: 1.55; margin: 0 0 .6rem; }
  .modal-foot.between { justify-content: space-between; }
  .btn-danger {
    background: transparent;
    color: #dc2626;
    border: 1px solid #dc2626;
    padding: .45rem 1rem;
    border-radius: 8px;
    font-size: .85rem;
    cursor: pointer;
  }
  .btn-danger:hover { background: #dc2626; color: #fff; }
  .sync-status { font-size: .78rem; color: var(--text-dim); }
  .sync-status.ok { color: #059669; }
  .sync-status.err { color: #dc2626; }
  @media (max-width: 600px) {
    h1 { font-size: 1.05rem; }
    .header-row { gap: .5rem; padding: .6rem .75rem .4rem; }
    main { padding: .75rem; }
    .grid { gap: .75rem; }
    .modal-body { font-size: .88rem; line-height: 1.7; }
  }
</style>
</head>
<body>
<header>
  <div class="header-row">
    <h1>📰 ニュース</h1>
    <input type="search" class="search-box" id="search" placeholder="検索（タイトル・本文・出典）" autocomplete="off">
    <label class="toggle"><input type="checkbox" id="unread-only">未読のみ</label>
    <button class="icon-btn" id="settings-open" aria-label="設定" title="設定">⚙</button>
  </div>
  <div class="filters" id="filters"></div>
</header>
<main>
  <div class="meta-row">
    <span id="count">読み込み中…</span>
    <span id="updated"></span>
  </div>
  <div class="grid" id="grid">
    <div class="loading">ニュースを取得しています…</div>
  </div>
</main>

<button class="fab" id="paste-open" aria-label="記事を保存">+</button>

<!-- Memo edit modal -->
<div class="modal-backdrop" id="memo-modal" hidden>
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-head">
      <h2 class="modal-title" id="memo-modal-title">メモ</h2>
      <button class="modal-close" data-close="memo-modal" aria-label="閉じる">×</button>
    </div>
    <div class="modal-body">
      <p class="form-help" id="memo-target-title"></p>
      <div class="form-row">
        <label for="memo-input">メモ（自由に書けます）</label>
        <textarea id="memo-input" rows="6" placeholder="授業ネタ、期末考査用、など"></textarea>
      </div>
    </div>
    <div class="modal-foot between">
      <button class="btn-danger" id="memo-delete">保存解除</button>
      <button class="btn" id="memo-save">保存</button>
    </div>
  </div>
</div>

<!-- URL paste modal -->
<div class="modal-backdrop" id="paste-modal" hidden>
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-head">
      <h2 class="modal-title">記事を保存（URL貼り付け）</h2>
      <button class="modal-close" data-close="paste-modal" aria-label="閉じる">×</button>
    </div>
    <div class="modal-body">
      <p class="form-help">北海道新聞などPWAの一覧に出てこない記事を保存できます。</p>
      <div class="form-row">
        <label for="paste-url">URL（必須）</label>
        <input type="url" id="paste-url" placeholder="https://...">
      </div>
      <div class="form-row">
        <label for="paste-title">タイトル（任意）</label>
        <input type="text" id="paste-title" placeholder="未入力ならURLが表示されます">
      </div>
      <div class="form-row">
        <label for="paste-memo">メモ（任意）</label>
        <textarea id="paste-memo" rows="4"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" id="paste-save">保存</button>
    </div>
  </div>
</div>

<!-- Settings modal -->
<div class="modal-backdrop" id="settings-modal" hidden>
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-head">
      <h2 class="modal-title">設定</h2>
      <button class="modal-close" data-close="settings-modal" aria-label="閉じる">×</button>
    </div>
    <div class="modal-body">
      <h3 style="margin:0 0 .4rem;font-size:.95rem">Gist同期（PCとスマホで保存記事を共有）</h3>
      <p class="form-help">
        GitHubトークン（gist権限）が必要です。<br>
        <a href="https://github.com/settings/tokens?type=beta" target="_blank" rel="noopener">トークンを発行する</a>
        → Repository accessは「Public Repositories (read-only)」、 Account permissionsで「Gists: Read and write」を有効に。
      </p>
      <div class="form-row">
        <label for="gh-token">GitHubトークン</label>
        <input type="password" id="gh-token" placeholder="ghp_... または github_pat_..." autocomplete="off">
      </div>
      <p class="sync-status" id="sync-status">未接続</p>
    </div>
    <div class="modal-foot between">
      <button class="btn-outline" id="sync-now">今すぐ同期</button>
      <button class="btn" id="settings-save">保存</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="modal" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-head">
      <div style="flex:1;min-width:0">
        <span class="topic" id="modal-topic"></span>
        <h2 class="modal-title" id="modal-title"></h2>
      </div>
      <button class="modal-close" id="modal-close" aria-label="閉じる">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot">
      <span class="source" id="modal-source"></span>
      <a class="btn" id="modal-link" href="#" target="_blank" rel="noopener noreferrer">元記事を開く</a>
    </div>
  </div>
</div>

<script>
const STATE = {
  data: null,
  filterTopic: 'all',
  search: '',
  unreadOnly: false,
  readSet: new Set(),
  saved: {},
  gist: { token: '', gistId: '', lastSyncAt: 0, lastSyncStatus: '' },
  renderLimit: 60,
};

const READ_KEY = 'news-pwa.read';
const READ_RETENTION_DAYS = 60;
const SAVED_KEY = 'news-pwa.saved';
const GIST_KEY = 'news-pwa.gist';
const GIST_FILENAME = 'news-pwa-saved.json';

function loadReadState() {
  try {
    const raw = localStorage.getItem(READ_KEY);
    if (!raw) return new Map();
    const obj = JSON.parse(raw);
    return new Map(Object.entries(obj));
  } catch { return new Map(); }
}
function saveReadState(map) {
  const cutoff = Date.now() - READ_RETENTION_DAYS * 86400 * 1000;
  const obj = {};
  for (const [url, ts] of map) if (ts >= cutoff) obj[url] = ts;
  localStorage.setItem(READ_KEY, JSON.stringify(obj));
}

const READ_MAP = loadReadState();
STATE.readSet = new Set(READ_MAP.keys());

function loadSaved() {
  try {
    const raw = localStorage.getItem(SAVED_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}
function saveSavedToLocal() {
  localStorage.setItem(SAVED_KEY, JSON.stringify(STATE.saved));
}
function loadGistConfig() {
  try {
    const raw = localStorage.getItem(GIST_KEY);
    return raw ? JSON.parse(raw) : { token: '', gistId: '', lastSyncAt: 0, lastSyncStatus: '' };
  } catch { return { token: '', gistId: '', lastSyncAt: 0, lastSyncStatus: '' }; }
}
function saveGistConfig() {
  localStorage.setItem(GIST_KEY, JSON.stringify(STATE.gist));
}
STATE.saved = loadSaved();
STATE.gist = loadGistConfig();

let SYNC_TIMER = null;
function scheduleSync() {
  if (!STATE.gist.token) return;
  clearTimeout(SYNC_TIMER);
  SYNC_TIMER = setTimeout(() => syncSavedToGist().catch(() => {}), 5000);
}

async function ghFetch(path, opts = {}) {
  const headers = {
    'Accept': 'application/vnd.github+json',
    'Authorization': `Bearer ${STATE.gist.token}`,
    'X-GitHub-Api-Version': '2022-11-28',
    ...(opts.headers || {}),
  };
  const res = await fetch(`https://api.github.com${path}`, { ...opts, headers });
  if (!res.ok) throw new Error(`GitHub API ${res.status}: ${await res.text().catch(() => '')}`);
  return res.json();
}

async function findOrCreateGist() {
  // existing?
  if (STATE.gist.gistId) return STATE.gist.gistId;
  // search user's gists for our filename
  try {
    const list = await ghFetch('/gists?per_page=100');
    const found = list.find(g => g.files && g.files[GIST_FILENAME]);
    if (found) {
      STATE.gist.gistId = found.id;
      saveGistConfig();
      return found.id;
    }
  } catch {}
  // create new
  const created = await ghFetch('/gists', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      description: 'news-pwa: あとで読む（自動生成）',
      public: false,
      files: { [GIST_FILENAME]: { content: JSON.stringify({ saved: {} }) } },
    }),
  });
  STATE.gist.gistId = created.id;
  saveGistConfig();
  return created.id;
}

async function syncSavedToGist() {
  if (!STATE.gist.token) return;
  try {
    setSyncStatus('syncing', '同期中…');
    const id = await findOrCreateGist();
    const body = { saved: STATE.saved, modifiedAt: Date.now() };
    await ghFetch(`/gists/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        files: { [GIST_FILENAME]: { content: JSON.stringify(body) } },
      }),
    });
    STATE.gist.lastSyncAt = Date.now();
    STATE.gist.lastSyncStatus = 'ok';
    saveGistConfig();
    setSyncStatus('ok', `同期完了 ${new Date().toLocaleTimeString('ja-JP')}`);
  } catch (err) {
    STATE.gist.lastSyncStatus = 'error';
    saveGistConfig();
    setSyncStatus('err', '同期エラー: ' + (err.message || err));
  }
}

async function syncSavedFromGist() {
  if (!STATE.gist.token) return;
  try {
    setSyncStatus('syncing', '読み込み中…');
    const id = await findOrCreateGist();
    const data = await ghFetch(`/gists/${id}`);
    const file = data.files && data.files[GIST_FILENAME];
    if (file && file.content) {
      const remote = JSON.parse(file.content);
      if (remote && remote.saved) {
        // merge: prefer newer modifiedAt per item
        for (const [url, rItem] of Object.entries(remote.saved)) {
          const local = STATE.saved[url];
          if (!local || (rItem.modifiedAt || 0) > (local.modifiedAt || 0)) {
            STATE.saved[url] = rItem;
          }
        }
        saveSavedToLocal();
      }
    }
    STATE.gist.lastSyncAt = Date.now();
    STATE.gist.lastSyncStatus = 'ok';
    saveGistConfig();
    setSyncStatus('ok', `読み込み完了 ${new Date().toLocaleTimeString('ja-JP')}`);
  } catch (err) {
    STATE.gist.lastSyncStatus = 'error';
    saveGistConfig();
    setSyncStatus('err', '同期エラー: ' + (err.message || err));
  }
}

function setSyncStatus(cls, text) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  el.className = 'sync-status ' + (cls || '');
  el.textContent = text;
}

function isSaved(url) { return !!STATE.saved[url]; }

function toggleSave(item) {
  if (isSaved(item.url)) {
    delete STATE.saved[item.url];
  } else {
    STATE.saved[item.url] = {
      url: item.url,
      title: item.title,
      source: item.source || '',
      topicId: item.topicId || '',
      topicName: item.topicName || '',
      topicColor: item.topicColor || '',
      memo: '',
      savedAt: Date.now(),
      modifiedAt: Date.now(),
      isPasted: !!item.isPasted,
    };
  }
  saveSavedToLocal();
  scheduleSync();
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const sec = diff / 1000;
  if (sec < 60) return 'たった今';
  if (sec < 3600) return Math.floor(sec / 60) + '分前';
  if (sec < 86400) return Math.floor(sec / 3600) + '時間前';
  if (sec < 86400 * 7) return Math.floor(sec / 86400) + '日前';
  const d = new Date(ts);
  return `${d.getMonth() + 1}/${d.getDate()}`;
}

function fmtUpdated(iso) {
  const d = new Date(iso);
  const pad = n => String(n).padStart(2, '0');
  return `更新: ${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

async function loadNews() {
  try {
    const res = await fetch('news.json', { cache: 'no-cache' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    STATE.data = await res.json();
    STATE.itemMap = new Map(STATE.data.items.map(i => [i.url, i]));
    renderFilters();
    render();
  } catch (e) {
    document.getElementById('grid').innerHTML =
      `<div class="empty">ニュースを取得できませんでした<br><small>${escapeHtml(e.message)}</small></div>`;
  }
}

function openSummary(item) {
  STATE.readSet.add(item.url);
  READ_MAP.set(item.url, Date.now());
  saveReadState(READ_MAP);

  // 要約が事前生成済みならモーダル表示、なければ即元記事を開く
  if (!item.summary) {
    window.open(item.url, '_blank', 'noopener,noreferrer');
    return;
  }

  const modal = document.getElementById('modal');
  document.getElementById('modal-title').textContent = item.title;
  const topicEl = document.getElementById('modal-topic');
  topicEl.textContent = item.topicName;
  topicEl.style.background = item.topicColor || '#6b7280';
  document.getElementById('modal-source').textContent = item.source;
  document.getElementById('modal-link').href = item.url;
  const bodyEl = document.getElementById('modal-body');
  bodyEl.classList.remove('error');
  bodyEl.textContent = item.summary;
  modal.hidden = false;
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  const modal = document.getElementById('modal');
  modal.hidden = true;
  modal.classList.remove('open');
  document.body.style.overflow = '';
}

function renderFilters() {
  const el = document.getElementById('filters');
  const all = { id: 'all', name: 'すべて', color: '#6b7280' };
  const savedCount = Object.keys(STATE.saved).length;
  const savedChip = { id: '__saved__', name: `📑 あとで読む${savedCount ? `（${savedCount}）` : ''}`, color: '#f59e0b' };
  const chips = [all, ...STATE.data.topics, savedChip];
  el.innerHTML = chips.map(t => {
    const active = STATE.filterTopic === t.id;
    const style = active ? `style="background:${t.color};border-color:${t.color};color:#fff"` : '';
    return `<button class="chip${active ? ' active' : ''}" data-id="${t.id}" ${style}>${escapeHtml(t.name)}</button>`;
  }).join('');
  el.querySelectorAll('.chip').forEach(b => {
    b.addEventListener('click', () => {
      STATE.filterTopic = b.dataset.id;
      STATE.renderLimit = 60;
      renderFilters();
      render();
    });
  });
}

function getSavedAsItems() {
  // savedの全件を表示用itemに変換。news.jsonに同URLがあればそれをマージ
  const arr = [];
  for (const [url, s] of Object.entries(STATE.saved)) {
    const newsItem = STATE.itemMap ? STATE.itemMap.get(url) : null;
    arr.push({
      url,
      title: s.title || (newsItem && newsItem.title) || url,
      snippet: newsItem ? newsItem.snippet : '',
      summary: newsItem ? newsItem.summary : '',
      image: newsItem ? newsItem.image : null,
      ogImage: newsItem ? newsItem.ogImage : null,
      pubDate: s.savedAt,
      source: s.source || (newsItem && newsItem.source) || 'メモ',
      topicId: s.topicId || (newsItem && newsItem.topicId) || 'saved',
      topicName: s.topicName || (newsItem && newsItem.topicName) || 'あとで読む',
      topicColor: s.topicColor || (newsItem && newsItem.topicColor) || '#f59e0b',
      isPasted: !!s.isPasted,
    });
  }
  return arr.sort((a, b) => b.pubDate - a.pubDate);
}

function filterItems() {
  const q = STATE.search.trim().toLowerCase();
  const isSavedView = STATE.filterTopic === '__saved__';
  const baseItems = isSavedView ? getSavedAsItems() : STATE.data.items;
  return baseItems.filter(it => {
    if (!isSavedView && STATE.filterTopic !== 'all' && it.topicId !== STATE.filterTopic) return false;
    if (STATE.unreadOnly && !isSavedView && STATE.readSet.has(it.url)) return false;
    if (q) {
      const memo = STATE.saved[it.url]?.memo || '';
      const blob = (it.title + ' ' + (it.snippet || '') + ' ' + (it.summary || '') + ' ' + it.source + ' ' + memo).toLowerCase();
      if (!blob.includes(q)) return false;
    }
    return true;
  });
}

const BOOKMARK_SVG = '<svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M6 3a2 2 0 00-2 2v16l8-3.5L20 21V5a2 2 0 00-2-2H6z"/></svg>';
const BOOKMARK_OUTLINE_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" xmlns="http://www.w3.org/2000/svg"><path d="M6 3a2 2 0 00-2 2v16l8-3.5L20 21V5a2 2 0 00-2-2H6z"/></svg>';

function renderCard(it) {
  const isRead = STATE.readSet.has(it.url);
  const saved = isSaved(it.url);
  const imgSrc = it.ogImage || it.image;
  const thumb = imgSrc
    ? `<div class="card-thumb"><img src="${escapeHtml(imgSrc)}" alt="" loading="lazy" referrerpolicy="no-referrer" onerror="this.closest('.card-thumb').remove()"></div>`
    : '';
  const body = it.summary
    ? `<div class="card-summary">${escapeHtml(it.summary)}</div>`
    : (it.snippet ? `<p class="card-snippet">${escapeHtml(it.snippet)}</p>` : '');
  const memo = saved && STATE.saved[it.url].memo
    ? `<div class="card-memo">${escapeHtml(STATE.saved[it.url].memo)}</div>`
    : '';
  const bookmarkSvg = saved ? BOOKMARK_SVG : BOOKMARK_OUTLINE_SVG;
  const isSavedView = STATE.filterTopic === '__saved__';
  const memoBtn = saved
    ? `<button class="memo-btn" data-action="memo" data-url="${escapeHtml(it.url)}">${STATE.saved[it.url].memo ? 'メモを編集' : 'メモを書く'}</button>`
    : '';
  const actions = isSavedView ? `<div class="card-actions">${memoBtn}</div>` : '';
  return `
    <a class="card${isRead ? ' read' : ''}" href="${escapeHtml(it.url)}" target="_blank" rel="noopener noreferrer" data-url="${escapeHtml(it.url)}">
      ${thumb}
      <div class="card-body">
        <div class="card-head">
          <span class="card-badge" style="background:${escapeHtml(it.topicColor || '#6b7280')}">${escapeHtml(it.topicName)}</span>
          <span class="card-head-right">
            <span class="card-time">${timeAgo(it.pubDate)}</span>
            <button class="card-bookmark${saved ? ' saved' : ''}" data-action="bookmark" data-url="${escapeHtml(it.url)}" aria-label="${saved ? '保存解除' : '保存'}" title="${saved ? '保存解除' : '保存'}">${bookmarkSvg}</button>
          </span>
        </div>
        <h3 class="card-title">${escapeHtml(it.title)}</h3>
        ${body}
        ${memo}
        <div class="card-source">${escapeHtml(it.source)}</div>
        ${actions}
      </div>
    </a>`;
}

function render() {
  const items = filterItems();
  const limited = items.slice(0, STATE.renderLimit);
  const grid = document.getElementById('grid');

  document.getElementById('count').textContent = `${items.length}件`;
  document.getElementById('updated').textContent = fmtUpdated(STATE.data.generatedAt);

  if (items.length === 0) {
    grid.innerHTML = '<div class="empty">該当するニュースはありません</div>';
    return;
  }

  let html = limited.map(renderCard).join('');
  if (items.length > limited.length) {
    html += `<div class="load-more"><button class="btn" id="more">もっと読む（残り${items.length - limited.length}件）</button></div>`;
  }
  grid.innerHTML = html;

  grid.querySelectorAll('.card').forEach(a => {
    a.addEventListener('click', (e) => {
      // 個別ボタン（ブックマーク/メモ）はカード遷移しない
      const btn = e.target.closest('[data-action]');
      if (btn) {
        e.preventDefault();
        e.stopPropagation();
        const url = btn.dataset.url;
        const action = btn.dataset.action;
        if (action === 'bookmark') {
          const item = STATE.itemMap?.get(url) || getSavedAsItems().find(x => x.url === url);
          if (item) {
            toggleSave(item);
            renderFilters();
            render();
          }
        } else if (action === 'memo') {
          openMemoModal(url);
        }
        return;
      }
      e.preventDefault();
      const url = a.dataset.url;
      const item = STATE.itemMap?.get(url) || getSavedAsItems().find(x => x.url === url);
      if (!item) { window.open(url, '_blank', 'noopener'); return; }
      a.classList.add('read');
      openSummary(item);
    });
  });
  const more = document.getElementById('more');
  if (more) more.addEventListener('click', () => { STATE.renderLimit += 60; render(); });
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target.id === 'modal') closeModal();
});

// 共通: モーダル開閉
function openModalById(id) {
  const m = document.getElementById(id);
  m.hidden = false;
  m.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModalById(id) {
  const m = document.getElementById(id);
  m.hidden = true;
  m.classList.remove('open');
  document.body.style.overflow = '';
}
document.querySelectorAll('[data-close]').forEach(b =>
  b.addEventListener('click', () => closeModalById(b.dataset.close))
);
['memo-modal', 'paste-modal', 'settings-modal'].forEach(id => {
  document.getElementById(id).addEventListener('click', (e) => {
    if (e.target.id === id) closeModalById(id);
  });
});
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Escape') return;
  ['modal', 'memo-modal', 'paste-modal', 'settings-modal'].forEach(id => {
    if (!document.getElementById(id).hidden) closeModalById(id);
  });
});

// Memo modal
let MEMO_TARGET_URL = '';
function openMemoModal(url) {
  const item = STATE.saved[url];
  if (!item) return;
  MEMO_TARGET_URL = url;
  document.getElementById('memo-target-title').textContent = item.title;
  document.getElementById('memo-input').value = item.memo || '';
  openModalById('memo-modal');
  setTimeout(() => document.getElementById('memo-input').focus(), 50);
}
document.getElementById('memo-save').addEventListener('click', () => {
  const v = document.getElementById('memo-input').value;
  const it = STATE.saved[MEMO_TARGET_URL];
  if (it) {
    it.memo = v;
    it.modifiedAt = Date.now();
    saveSavedToLocal();
    scheduleSync();
  }
  closeModalById('memo-modal');
  render();
});
document.getElementById('memo-delete').addEventListener('click', () => {
  if (!confirm('保存解除しますか？（メモも削除されます）')) return;
  delete STATE.saved[MEMO_TARGET_URL];
  saveSavedToLocal();
  scheduleSync();
  closeModalById('memo-modal');
  renderFilters();
  render();
});

// Paste URL modal
document.getElementById('paste-open').addEventListener('click', () => {
  document.getElementById('paste-url').value = '';
  document.getElementById('paste-title').value = '';
  document.getElementById('paste-memo').value = '';
  openModalById('paste-modal');
  setTimeout(() => document.getElementById('paste-url').focus(), 50);
});
document.getElementById('paste-save').addEventListener('click', () => {
  const url = document.getElementById('paste-url').value.trim();
  const title = document.getElementById('paste-title').value.trim();
  const memo = document.getElementById('paste-memo').value;
  if (!url || !/^https?:\/\//.test(url)) {
    alert('有効なURLを入力してください');
    return;
  }
  STATE.saved[url] = {
    url,
    title: title || url,
    source: '貼り付け',
    topicId: 'saved',
    topicName: 'あとで読む',
    topicColor: '#f59e0b',
    memo,
    savedAt: Date.now(),
    modifiedAt: Date.now(),
    isPasted: true,
  };
  saveSavedToLocal();
  scheduleSync();
  closeModalById('paste-modal');
  renderFilters();
  render();
});

// Settings modal
document.getElementById('settings-open').addEventListener('click', () => {
  document.getElementById('gh-token').value = STATE.gist.token || '';
  if (STATE.gist.lastSyncAt) {
    setSyncStatus(STATE.gist.lastSyncStatus === 'ok' ? 'ok' : (STATE.gist.lastSyncStatus === 'error' ? 'err' : ''),
      `前回: ${new Date(STATE.gist.lastSyncAt).toLocaleString('ja-JP')}（${STATE.gist.lastSyncStatus || '不明'}）`);
  } else {
    setSyncStatus('', STATE.gist.token ? '未同期' : '未接続');
  }
  openModalById('settings-modal');
});
document.getElementById('settings-save').addEventListener('click', async () => {
  const t = document.getElementById('gh-token').value.trim();
  STATE.gist.token = t;
  saveGistConfig();
  if (t) {
    await syncSavedFromGist();
    await syncSavedToGist();
    renderFilters();
    render();
  } else {
    setSyncStatus('', '未接続');
  }
});
document.getElementById('sync-now').addEventListener('click', async () => {
  if (!STATE.gist.token) {
    alert('先にトークンを入力してください');
    return;
  }
  await syncSavedFromGist();
  await syncSavedToGist();
  renderFilters();
  render();
});

document.getElementById('search').addEventListener('input', e => {
  STATE.search = e.target.value;
  STATE.renderLimit = 60;
  render();
});
document.getElementById('unread-only').addEventListener('change', e => {
  STATE.unreadOnly = e.target.checked;
  STATE.renderLimit = 60;
  render();
});

loadNews();
if (STATE.gist.token) syncSavedFromGist().catch(() => {});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
}
</script>
</body>
