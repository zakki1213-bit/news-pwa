<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>北海道ニュース 朝刊夕刊</title>
<link rel="canonical" href="./paper/">
<meta http-equiv="refresh" content="0; url=./paper/">
<script>
  // 古いSWが残っている場合は登録解除してからリダイレクト
  (async () => {
    if ('serviceWorker' in navigator) {
      try {
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.filter(r => !r.scope.endsWith('/paper/')).map(r => r.unregister()));
      } catch (_) {}
    }
    location.replace('./paper/' + location.search + location.hash);
  })();
</script>
</head>
<body>
<p>朝刊夕刊ページへ移動します… <a href="./paper/">自動で移動しない場合はこちら</a></p>
</body>
</html>
