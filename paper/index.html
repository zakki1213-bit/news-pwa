<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>朝刊夕刊</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a1a">
<style>
  :root {
    --bg: #fbfaf6;
    --paper: #ffffff;
    --ink: #1a1a1a;
    --ink-dim: #555;
    --ink-light: #888;
    --rule: #1a1a1a;
    --rule-soft: #d6d3cf;
    --accent: #b91c1c;
    --top-bg: rgba(185, 28, 28, 0.03);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --paper: #232323;
      --ink: #e8e6e0;
      --ink-dim: #a8a59f;
      --ink-light: #80807a;
      --rule: #e8e6e0;
      --rule-soft: #3a3a3a;
      --accent: #f87171;
      --top-bg: rgba(248, 113, 113, 0.06);
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Yu Mincho", "Hiragino Mincho ProN", "Hiragino Mincho Pro", "Noto Serif JP", "MS Mincho", serif;
    line-height: 1.85;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "palt";
  }
  header.bar {
    position: sticky;
    top: 0;
    background: var(--paper);
    border-bottom: 1px solid var(--rule-soft);
    padding: .7rem 1rem;
    z-index: 100;
    box-shadow: 0 1px 3px rgba(0,0,0,.04);
  }
  .bar-row {
    max-width: 960px;
    margin: 0 auto;
    display: flex;
    gap: .5rem;
    align-items: center;
    flex-wrap: wrap;
  }
  .bar-title {
    font-weight: 700;
    margin-right: auto;
    font-size: 1.05rem;
    letter-spacing: .04em;
  }
  .tab {
    background: transparent;
    border: 1px solid var(--rule-soft);
    color: var(--ink);
    padding: .35rem .8rem;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: .9rem;
  }
  .tab.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  select.tab {
    appearance: none;
    -webkit-appearance: none;
    padding-right: 1.6rem;
    background-image: linear-gradient(45deg, transparent 50%, currentColor 50%), linear-gradient(135deg, currentColor 50%, transparent 50%);
    background-position: calc(100% - 14px) 50%, calc(100% - 9px) 50%;
    background-size: 5px 5px;
    background-repeat: no-repeat;
  }
  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 1.5rem 1.25rem 4rem;
  }
  .paper-mast {
    text-align: center;
    padding: 1.2rem 0 .8rem;
    border-top: 4px double var(--rule);
    border-bottom: 1px solid var(--rule);
    margin-bottom: 1.5rem;
  }
  .paper-mast .kind {
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: .3em;
    margin-bottom: .2rem;
  }
  .paper-mast .meta {
    font-size: .85rem;
    color: var(--ink-dim);
    letter-spacing: .15em;
  }
  .lead {
    padding: 1rem 1.2rem;
    margin: 0 0 2rem;
    border-left: 4px solid var(--accent);
    background: var(--top-bg);
    font-size: 1rem;
    line-height: 1.95;
  }

  /* トップ記事 */
  .top-story {
    margin-bottom: 2.6rem;
    padding-bottom: 1.6rem;
    border-bottom: 3px double var(--rule);
  }
  .top-story .top-label {
    display: inline-block;
    background: var(--ink);
    color: var(--paper);
    padding: .15rem .8rem;
    font-size: .72rem;
    letter-spacing: .25em;
    margin-bottom: .8rem;
  }
  .top-story .top-topic {
    display: inline-block;
    color: var(--ink-dim);
    font-size: .8rem;
    margin-left: .6rem;
  }
  .top-story .top-topic::before {
    content: "";
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--topic-color, var(--ink-dim));
    margin-right: .35rem;
    vertical-align: middle;
  }
  .top-story h1 {
    font-size: 1.85rem;
    font-weight: 900;
    line-height: 1.4;
    margin: .4rem 0 1.2rem;
    letter-spacing: .02em;
  }
  .top-hero {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    background: var(--rule-soft);
    margin: 0 0 1.3rem;
    display: block;
    border-radius: 2px;
  }
  .mid-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    background: var(--rule-soft);
    margin-bottom: .65rem;
    display: block;
    border-radius: 2px;
  }
  .top-story .body {
    font-size: 1.02rem;
    line-height: 2;
  }
  .top-story .body p { margin: 0 0 1rem; text-indent: 1em; }
  .top-story .body p:last-child { margin-bottom: 0; }

  /* 中段記事 */
  .mid-section {
    margin: 0 0 2.6rem;
  }
  .mid-section-head {
    border-top: 2px solid var(--rule);
    padding: .5rem 0;
    margin-bottom: 1.2rem;
    font-size: .75rem;
    letter-spacing: .25em;
    color: var(--ink-dim);
    font-weight: 700;
  }
  .mid-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1.5rem;
  }
  @media (min-width: 720px) {
    .mid-grid { grid-template-columns: 1fr 1fr; gap: 1.5rem 2rem; }
  }
  .mid-story {
    border-top: 1px solid var(--rule-soft);
    padding-top: .8rem;
  }
  .mid-story .topic {
    color: var(--ink-dim);
    font-size: .72rem;
    letter-spacing: .15em;
    margin-bottom: .3rem;
  }
  .mid-story .topic::before {
    content: "";
    display: inline-block;
    width: 5px;
    height: 5px;
    background: var(--topic-color, var(--ink-dim));
    margin-right: .3rem;
    vertical-align: middle;
  }
  .mid-story h2 {
    font-size: 1.18rem;
    font-weight: 700;
    line-height: 1.45;
    margin: .15rem 0 .7rem;
  }
  .mid-story .body {
    font-size: .95rem;
    line-height: 1.9;
  }
  .mid-story .body p { margin: 0 0 .7rem; text-indent: 1em; }
  .mid-story .body p:last-child { margin-bottom: 0; }
  .mid-story .ref-link {
    display: inline-block;
    margin-top: .6rem;
    font-size: .75rem;
    color: var(--ink-dim);
    text-decoration: none;
    border-bottom: 1px dotted var(--ink-light);
  }
  .mid-story .ref-link:hover { color: var(--ink); }

  /* ベタ記事 */
  .briefs-section {
    margin: 0 0 2rem;
  }
  .briefs-section-head {
    border-top: 2px solid var(--rule);
    padding: .5rem 0;
    margin-bottom: 1rem;
    font-size: .75rem;
    letter-spacing: .25em;
    color: var(--ink-dim);
    font-weight: 700;
  }
  .brief {
    padding: .8rem 0;
    border-bottom: 1px dotted var(--rule-soft);
  }
  .brief:last-child { border-bottom: none; }
  .brief .head-row {
    display: flex;
    align-items: baseline;
    gap: .6rem;
    margin-bottom: .25rem;
    flex-wrap: wrap;
  }
  .brief .topic-tag {
    font-size: .7rem;
    color: var(--ink-dim);
    letter-spacing: .1em;
    white-space: nowrap;
  }
  .brief .topic-tag::before {
    content: "";
    display: inline-block;
    width: 5px;
    height: 5px;
    background: var(--topic-color, var(--ink-dim));
    margin-right: .3rem;
    vertical-align: middle;
  }
  .brief h3 {
    font-size: 1rem;
    font-weight: 700;
    margin: 0;
    line-height: 1.45;
    flex: 1;
    min-width: 0;
  }
  .brief .body {
    font-size: .88rem;
    color: var(--ink-dim);
    line-height: 1.75;
    margin: 0;
  }
  .brief a {
    color: inherit;
    text-decoration: none;
  }
  .brief a:hover { color: var(--accent); }
  .brief .src {
    font-size: .72rem;
    color: var(--ink-light);
    margin-left: .4rem;
  }

  /* 投票ボタン */
  .vote-row {
    display: flex;
    gap: .4rem;
    margin-top: 1rem;
    padding-top: .7rem;
    border-top: 1px dotted var(--rule-soft);
    align-items: center;
  }
  .vote-row.compact { margin-top: .4rem; padding-top: .3rem; border-top: none; }
  .vote-btn {
    background: var(--paper);
    border: 1px solid var(--rule-soft);
    color: var(--ink-dim);
    border-radius: 999px;
    padding: .3rem .8rem;
    cursor: pointer;
    font-size: .82rem;
    font-family: inherit;
    transition: all .15s;
    display: inline-flex;
    align-items: center;
    gap: .25rem;
  }
  .vote-btn:hover { color: var(--ink); border-color: var(--ink); }
  .vote-btn.up.active { background: rgba(5, 150, 105, .12); border-color: #059669; color: #059669; }
  .vote-btn.down.active { background: rgba(220, 38, 38, .12); border-color: #dc2626; color: #dc2626; }
  .vote-status {
    margin-left: auto;
    font-size: .72rem;
    color: var(--ink-light);
  }
  /* 設定モーダル */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-backdrop.open { display: flex; }
  .modal-box {
    background: var(--paper);
    color: var(--ink);
    border-radius: 8px;
    max-width: 480px;
    width: 100%;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,.3);
  }
  .modal-head {
    padding: .9rem 1.1rem;
    border-bottom: 1px solid var(--rule-soft);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-head h2 { margin: 0; font-size: 1.05rem; font-weight: 700; }
  .modal-close {
    background: none;
    border: none;
    font-size: 1.4rem;
    cursor: pointer;
    color: var(--ink-dim);
    padding: 0 .25rem;
  }
  .modal-body {
    padding: 1rem 1.1rem;
    overflow-y: auto;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
    line-height: 1.6;
  }
  .modal-body label { display: block; font-size: .85rem; font-weight: 500; color: var(--ink-dim); margin-bottom: .3rem; }
  .modal-body input {
    width: 100%;
    box-sizing: border-box;
    padding: .55rem .7rem;
    border: 1px solid var(--rule-soft);
    border-radius: 6px;
    background: var(--bg);
    color: var(--ink);
    font-size: .92rem;
    font-family: inherit;
  }
  .modal-body p { font-size: .82rem; color: var(--ink-dim); line-height: 1.6; margin: .5rem 0; }
  .modal-body .help { font-size: .78rem; line-height: 1.6; }
  .modal-foot {
    padding: .8rem 1.1rem;
    border-top: 1px solid var(--rule-soft);
    display: flex;
    gap: .5rem;
    justify-content: flex-end;
  }
  .btn-primary {
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: .5rem 1.2rem;
    border-radius: 6px;
    font-family: inherit;
    cursor: pointer;
    font-size: .9rem;
  }
  .btn-secondary {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--rule-soft);
    padding: .5rem 1.2rem;
    border-radius: 6px;
    font-family: inherit;
    cursor: pointer;
    font-size: .9rem;
  }
  .status-line { font-size: .8rem; margin: .6rem 0; color: var(--ink-dim); }
  .status-line.ok { color: #059669; }
  .status-line.err { color: #dc2626; }
  .empty, .loading {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--ink-dim);
  }
  @media (max-width: 600px) {
    main { padding: 1rem .9rem 4rem; }
    .paper-mast .kind { font-size: 1.6rem; }
    .top-story h1 { font-size: 1.45rem; }
    .top-story .body { font-size: .96rem; line-height: 1.9; }
    .mid-story h2 { font-size: 1.05rem; }
    .mid-story .body { font-size: .9rem; }
    .lead { padding: .8rem 1rem; font-size: .95rem; }
  }
</style>
</head>
<body>
<header class="bar">
  <div class="bar-row">
    <span class="bar-title">📰 朝刊夕刊</span>
    <button class="tab" data-kind="morning" id="tab-morning">朝刊</button>
    <button class="tab" data-kind="evening" id="tab-evening">夕刊</button>
    <select class="tab" id="select-date" aria-label="日付選択"></select>
    <button class="tab" id="settings-open" aria-label="設定" title="設定">⚙</button>
  </div>
</header>
<main id="main">
  <div class="loading">読み込み中…</div>
</main>

<!-- 設定モーダル -->
<div class="modal-backdrop" id="settings-modal">
  <div class="modal-box">
    <div class="modal-head">
      <h2>設定</h2>
      <button class="modal-close" id="settings-close" aria-label="閉じる">×</button>
    </div>
    <div class="modal-body">
      <p class="help">👍/👎の投票をリポジトリ（paper/votes.json）に保存して、次回以降の紙面生成に反映させます。</p>
      <p class="help">必要な権限：<a href="https://github.com/settings/tokens?type=beta" target="_blank" rel="noopener">トークン設定を開く</a> →
        Repository accessは zakki1213-bit/news-pwa を選択、 Repository permissions → <strong>Contents: Read and write</strong> を有効に。</p>
      <div style="margin-top:.8rem">
        <label for="gh-token">GitHubトークン</label>
        <input type="password" id="gh-token" placeholder="github_pat_..." autocomplete="off">
      </div>
      <p class="status-line" id="sync-status">未接続</p>
    </div>
    <div class="modal-foot">
      <button class="btn-secondary" id="sync-now-btn">いま同期</button>
      <button class="btn-primary" id="settings-save">保存</button>
    </div>
  </div>
</div>

<script>
const REPO_OWNER = 'zakki1213-bit';
const REPO_NAME = 'news-pwa';
const VOTES_PATH = 'paper/votes.json';
const VOTES_LOCAL_KEY = 'paper.votes';
const TOKEN_LOCAL_KEY = 'paper.token';
const SYNC_DEBOUNCE_MS = 8000;

const STATE = {
  kind: 'morning',
  date: null,
  index: null,
  votes: {},          // url -> { vote, title, topicId, topicName, source, votedAt }
  votesSha: null,     // remote sha for paper/votes.json
  token: '',
};

function pad(n){return String(n).padStart(2,'0');}
function fmtPubDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const days = ['日','月','火','水','木','金','土'];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${days[d.getDay()]}）`;
}
function fmtPubTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return `発行 ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function escapeHtml(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

// ==================== 投票・設定 ====================
function loadVotesLocal() {
  try { return JSON.parse(localStorage.getItem(VOTES_LOCAL_KEY) || '{}'); } catch { return {}; }
}
function saveVotesLocal() {
  localStorage.setItem(VOTES_LOCAL_KEY, JSON.stringify(STATE.votes));
}
STATE.votes = loadVotesLocal();
STATE.token = localStorage.getItem(TOKEN_LOCAL_KEY) || '';

function utf8ToBase64(s) { return btoa(unescape(encodeURIComponent(s))); }
function base64ToUtf8(b) { return decodeURIComponent(escape(atob(b.replace(/\s/g, '')))); }

async function ghFetch(path, opts = {}) {
  const headers = {
    'Accept': 'application/vnd.github+json',
    'Authorization': `Bearer ${STATE.token}`,
    'X-GitHub-Api-Version': '2022-11-28',
    ...(opts.headers || {}),
  };
  const res = await fetch(`https://api.github.com${path}`, { ...opts, headers });
  if (!res.ok) throw new Error(`GitHub API ${res.status}`);
  return res.json();
}

async function loadVotesFromRepo() {
  if (!STATE.token) return;
  try {
    const data = await ghFetch(`/repos/${REPO_OWNER}/${REPO_NAME}/contents/${VOTES_PATH}`);
    STATE.votesSha = data.sha;
    const remote = JSON.parse(base64ToUtf8(data.content));
    if (remote && remote.votes) {
      for (const [url, v] of Object.entries(remote.votes)) {
        const local = STATE.votes[url];
        if (!local || (v.votedAt || 0) > (local.votedAt || 0)) STATE.votes[url] = v;
      }
      saveVotesLocal();
    }
    setSyncStatus('ok', `読込完了 ${new Date().toLocaleTimeString('ja-JP')}`);
  } catch (err) {
    if (/\b404\b/.test(err.message)) {
      STATE.votesSha = null;
      setSyncStatus('', '初回（リポジトリにvotes.jsonなし）');
    } else {
      setSyncStatus('err', '読込エラー: ' + err.message);
    }
  }
}

async function saveVotesToRepo() {
  if (!STATE.token) return;
  try {
    setSyncStatus('', '同期中…');
    const content = JSON.stringify({
      modifiedAt: new Date().toISOString(),
      votes: STATE.votes,
    }, null, 2) + '\n';
    const body = {
      message: 'Update paper/votes.json from PWA',
      content: utf8ToBase64(content),
    };
    if (STATE.votesSha) body.sha = STATE.votesSha;
    const res = await ghFetch(`/repos/${REPO_OWNER}/${REPO_NAME}/contents/${VOTES_PATH}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    STATE.votesSha = res.content?.sha || STATE.votesSha;
    setSyncStatus('ok', `同期完了 ${new Date().toLocaleTimeString('ja-JP')}`);
  } catch (err) {
    if (/\b409\b/.test(err.message)) {
      // sha競合 → 再読込してマージ後リトライ
      await loadVotesFromRepo();
      try {
        const content = JSON.stringify({ modifiedAt: new Date().toISOString(), votes: STATE.votes }, null, 2) + '\n';
        await ghFetch(`/repos/${REPO_OWNER}/${REPO_NAME}/contents/${VOTES_PATH}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: 'Update paper/votes.json (merged)', content: utf8ToBase64(content), sha: STATE.votesSha }),
        });
        setSyncStatus('ok', `同期完了（マージ） ${new Date().toLocaleTimeString('ja-JP')}`);
      } catch (e2) {
        setSyncStatus('err', '同期エラー: ' + e2.message);
      }
    } else {
      setSyncStatus('err', '同期エラー: ' + err.message);
    }
  }
}

let SYNC_TIMER = null;
function scheduleSync() {
  if (!STATE.token) return;
  clearTimeout(SYNC_TIMER);
  SYNC_TIMER = setTimeout(() => { saveVotesToRepo().catch(() => {}); }, SYNC_DEBOUNCE_MS);
}

function setSyncStatus(cls, text) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  el.className = 'status-line ' + (cls || '');
  el.textContent = text;
}

function voteFor(item, dir) {
  if (!item || !item.url) return;
  const cur = STATE.votes[item.url];
  if (cur && cur.vote === dir) {
    delete STATE.votes[item.url];
  } else {
    STATE.votes[item.url] = {
      vote: dir,
      title: item.title || '',
      topicId: item.topicId || '',
      topicName: item.topicName || '',
      source: item.source || (item.references && item.references[0] && item.references[0].source) || '',
      votedAt: Date.now(),
    };
  }
  saveVotesLocal();
  scheduleSync();
}

function getVoteState(url) { return STATE.votes[url]?.vote || null; }
function toParagraphs(text) {
  const parts = String(text || '').split(/\n\s*\n/).map(p => p.trim()).filter(Boolean);
  return parts.map(p => `<p>${escapeHtml(p).replace(/\n/g, '<br>')}</p>`).join('');
}

async function loadIndex() {
  const res = await fetch('../editions/index.json', { cache: 'no-cache' });
  if (!res.ok) throw new Error('index.json取得失敗');
  STATE.index = await res.json();
}
async function loadEdition(date, kind) {
  const res = await fetch(`../editions/${date}-${kind}.json`, { cache: 'no-cache' });
  if (!res.ok) throw new Error(`${date}-${kind}.json取得失敗`);
  return res.json();
}
function buildSelectOptions() {
  const sel = document.getElementById('select-date');
  const dates = [...new Set(STATE.index.editions.map(e => e.date))];
  sel.innerHTML = dates.map(d => `<option value="${escapeHtml(d)}"${d===STATE.date?' selected':''}>${escapeHtml(d)}</option>`).join('');
}
function findEdition(date, kind) {
  return STATE.index.editions.find(e => e.date === date && e.type === kind);
}

function voteRow(url, opts = {}) {
  const v = getVoteState(url);
  const cls = opts.compact ? ' compact' : '';
  return `<div class="vote-row${cls}">
    <button class="vote-btn up${v === 'up' ? ' active' : ''}" data-action="vote-up" data-url="${escapeHtml(url)}" type="button">👍 いいね</button>
    <button class="vote-btn down${v === 'down' ? ' active' : ''}" data-action="vote-down" data-url="${escapeHtml(url)}" type="button">👎 興味ない</button>
  </div>`;
}

function renderTopStory(t) {
  if (!t) return '';
  const hero = t.ogImage
    ? `<img class="top-hero" src="${escapeHtml(t.ogImage)}" alt="" loading="lazy" referrerpolicy="no-referrer" onerror="this.remove()">`
    : '';
  const url = (t.references && t.references[0] && t.references[0].url) || '';
  return `
    <section class="top-story" style="--topic-color:${escapeHtml(t.color || '#1a1a1a')}">
      <div>
        <span class="top-label">トップ</span>
        <span class="top-topic">${escapeHtml(t.topicName || '')}</span>
      </div>
      <h1>${escapeHtml(t.title)}</h1>
      ${hero}
      <div class="body">${toParagraphs(t.body)}</div>
      ${url ? voteRow(url) : ''}
    </section>`;
}
function renderMidSection(arr) {
  if (!arr || !arr.length) return '';
  const items = arr.map(s => {
    const thumb = s.ogImage
      ? `<img class="mid-thumb" src="${escapeHtml(s.ogImage)}" alt="" loading="lazy" referrerpolicy="no-referrer" onerror="this.remove()">`
      : '';
    const url = (s.references && s.references[0] && s.references[0].url) || '';
    return `
    <article class="mid-story" style="--topic-color:${escapeHtml(s.color || '#1a1a1a')}">
      ${thumb}
      <div class="topic">${escapeHtml(s.topicName || '')}</div>
      <h2>${escapeHtml(s.title)}</h2>
      <div class="body">${toParagraphs(s.body)}</div>
      ${url ? `<a class="ref-link" href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">▸ ${escapeHtml(s.references[0].source || '元記事')}</a>` : ''}
      ${url ? voteRow(url, { compact: true }) : ''}
    </article>`;
  }).join('');
  return `
    <section class="mid-section">
      <div class="mid-section-head">中段</div>
      <div class="mid-grid">${items}</div>
    </section>`;
}
function renderBriefs(arr) {
  if (!arr || !arr.length) return '';
  const items = arr.map(b => `
    <div class="brief" style="--topic-color:${escapeHtml(b.color || '#1a1a1a')}">
      <div class="head-row">
        <span class="topic-tag">${escapeHtml(b.topicName || '')}</span>
        <h3><a href="${escapeHtml(b.url || '#')}" target="_blank" rel="noopener noreferrer">${escapeHtml(b.title)}</a><span class="src">${escapeHtml(b.source || '')}</span></h3>
      </div>
      <p class="body">${escapeHtml(b.body)}</p>
      ${b.url ? voteRow(b.url, { compact: true }) : ''}
    </div>
  `).join('');
  return `
    <section class="briefs-section">
      <div class="briefs-section-head">ベタ</div>
      ${items}
    </section>`;
}

let CURRENT_EDITION = null;
function render(edition) {
  CURRENT_EDITION = edition;
  const main = document.getElementById('main');
  if (!edition) { main.innerHTML = '<div class="empty">この紙面はまだありません</div>'; return; }
  const kindLabel = edition.type === 'evening' ? '夕刊' : '朝刊';
  const pubDate = fmtPubDate(edition.generatedAt);
  const pubTime = fmtPubTime(edition.generatedAt);

  const hasContent = !!(edition.topStory || (edition.midStories && edition.midStories.length) || (edition.briefs && edition.briefs.length));

  main.innerHTML = `
    <div class="paper-mast">
      <div class="kind">${kindLabel}</div>
      <div class="meta">${pubDate}　${pubTime}</div>
    </div>
    ${edition.lead ? `<div class="lead">${escapeHtml(edition.lead)}</div>` : ''}
    ${renderTopStory(edition.topStory)}
    ${renderMidSection(edition.midStories)}
    ${renderBriefs(edition.briefs)}
    ${!hasContent ? '<div class="empty">本日の' + kindLabel + 'は準備中です</div>' : ''}
  `;
  window.scrollTo(0, 0);
}

async function refresh() {
  document.getElementById('tab-morning').classList.toggle('active', STATE.kind === 'morning');
  document.getElementById('tab-evening').classList.toggle('active', STATE.kind === 'evening');
  const main = document.getElementById('main');
  main.innerHTML = '<div class="loading">読み込み中…</div>';
  const meta = findEdition(STATE.date, STATE.kind);
  if (!meta) {
    main.innerHTML = `<div class="empty">${STATE.date} の${STATE.kind === 'evening' ? '夕刊' : '朝刊'}はありません</div>`;
    return;
  }
  try {
    const ed = await loadEdition(STATE.date, STATE.kind);
    render(ed);
  } catch (e) {
    main.innerHTML = `<div class="empty">読み込みエラー: ${escapeHtml(e.message)}</div>`;
  }
}

async function init() {
  try {
    await loadIndex();
    if (!STATE.index.editions.length) {
      document.getElementById('main').innerHTML = '<div class="empty">まだ紙面が生成されていません</div>';
      return;
    }
    const latest = STATE.index.editions[0];
    STATE.date = latest.date;
    STATE.kind = latest.type;
    buildSelectOptions();
    await refresh();
  } catch (e) {
    document.getElementById('main').innerHTML = `<div class="empty">起動エラー: ${escapeHtml(e.message)}</div>`;
  }
}

document.getElementById('tab-morning').addEventListener('click', () => { STATE.kind = 'morning'; refresh(); });
document.getElementById('tab-evening').addEventListener('click', () => { STATE.kind = 'evening'; refresh(); });
document.getElementById('select-date').addEventListener('change', (e) => { STATE.date = e.target.value; refresh(); });

// 投票ボタンクリック処理（イベント委譲）
document.getElementById('main').addEventListener('click', (e) => {
  const btn = e.target.closest('[data-action^="vote-"]');
  if (!btn) return;
  e.preventDefault();
  const url = btn.dataset.url;
  const dir = btn.dataset.action === 'vote-up' ? 'up' : 'down';
  // 該当の記事情報を見つける（render時の data 構造から）
  const article = findArticleByUrl(url);
  if (!article) return;
  voteFor(article, dir);
  // ボタン見た目更新（再render不要な軽量版）
  btn.closest('.vote-row').querySelectorAll('.vote-btn').forEach((b) => b.classList.remove('active'));
  const v = getVoteState(url);
  if (v) {
    const targetBtn = btn.closest('.vote-row').querySelector(`.vote-btn.${v}`);
    if (targetBtn) targetBtn.classList.add('active');
  }
});

function findArticleByUrl(url) {
  if (!CURRENT_EDITION) return null;
  const t = CURRENT_EDITION.topStory;
  if (t && t.references && t.references[0] && t.references[0].url === url) {
    return { url, title: t.title, topicId: t.topicId, topicName: t.topicName, source: t.references[0].source };
  }
  for (const m of (CURRENT_EDITION.midStories || [])) {
    if (m.references && m.references[0] && m.references[0].url === url) {
      return { url, title: m.title, topicId: m.topicId, topicName: m.topicName, source: m.references[0].source };
    }
  }
  for (const b of (CURRENT_EDITION.briefs || [])) {
    if (b.url === url) {
      return { url, title: b.title, topicId: b.topicId, topicName: b.topicName, source: b.source };
    }
  }
  return null;
}

// 設定モーダル
function openSettings() {
  document.getElementById('gh-token').value = STATE.token || '';
  if (STATE.token) setSyncStatus('', '接続済み（同期可）');
  else setSyncStatus('', '未接続');
  document.getElementById('settings-modal').classList.add('open');
}
function closeSettings() { document.getElementById('settings-modal').classList.remove('open'); }
document.getElementById('settings-open').addEventListener('click', openSettings);
document.getElementById('settings-close').addEventListener('click', closeSettings);
document.getElementById('settings-modal').addEventListener('click', (e) => {
  if (e.target.id === 'settings-modal') closeSettings();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && document.getElementById('settings-modal').classList.contains('open')) closeSettings();
});
document.getElementById('settings-save').addEventListener('click', async () => {
  const t = document.getElementById('gh-token').value.trim();
  STATE.token = t;
  if (t) {
    localStorage.setItem(TOKEN_LOCAL_KEY, t);
    await loadVotesFromRepo();
    await saveVotesToRepo();
  } else {
    localStorage.removeItem(TOKEN_LOCAL_KEY);
    setSyncStatus('', '未接続');
  }
});
document.getElementById('sync-now-btn').addEventListener('click', async () => {
  if (!STATE.token) { setSyncStatus('err', 'トークン未設定'); return; }
  await loadVotesFromRepo();
  await saveVotesToRepo();
  refresh();
});

init();
if (STATE.token) loadVotesFromRepo().catch(() => {});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
}
</script>
